services:
  # Сбор метрик с бота (bot:9090). Инструкция: PROMETHEUS_GRAFANA_SETUP.md
  prometheus:
    image: prom/prometheus:latest
    container_name: antiblock-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9091:9090"
    networks:
      - antiblock-network

  # Grafana: доступ по https://notecalendar.ru/grafana (нужен nginx proxy). См. PROMETHEUS_GRAFANA_SETUP.md
  grafana:
    image: grafana/grafana:latest
    container_name: antiblock-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://notecalendar.ru/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # PostgreSQL — данные с первого дня (тот же .env, что и у основного приложения)
      GF_DATASOURCE_2_NAME: PostgreSQL
      GF_DATASOURCE_2_TYPE: postgres
      GF_DATASOURCE_2_HOST: postgres
      GF_DATASOURCE_2_PORT: "5432"
      GF_DATASOURCE_2_DATABASE: antiblock
      GF_DATASOURCE_2_USER: postgres
      GF_DATASOURCE_2_PASSWORD: ${DB_PASSWORD:-postgres}
      GF_DATASOURCE_2_IS_DEFAULT: "false"
      GF_DATASOURCE_2_EDITABLE: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - antiblock-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  antiblock-network:
    external: true
    name: antiblock_antiblock-network
