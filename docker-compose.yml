version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: antiblock-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-antiblock}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - antiblock-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antiblock-bot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_ID_1: ${TELEGRAM_ADMIN_ID_1}
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-antiblock}
      DB_SSLMODE: disable
      DB_TIMEZONE: UTC
      
      # CryptoBot
      CRYPTOBOT_API_TOKEN: ${CRYPTOBOT_API_TOKEN}
    restart: unless-stopped
    networks:
      - antiblock-network

volumes:
  postgres_data:

networks:
  antiblock-network:
    driver: bridge
