services:
  postgres:
    image: postgres:15-alpine
    container_name: antiblock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-antiblock}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - antiblock-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antiblock-bot
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Сертификаты для подключения к премиум Docker по TLS (порт 2376). Путь в контейнере — абсолютный.
      # На хосте: положите ca.pem, cert.pem, key.pem в папку и задайте DOCKER_CERTS_PATH (например /root/antiblock/docker-certs).
      - ${DOCKER_CERTS_PATH:-./docker-certs}:/antiblock/docker-certs:ro
      # SSH-ключ бота для подключения к Premium VPS.
      - ${PREMIUM_KEYS_PATH:-./premium-keys}:/antiblock/premium-keys:ro
    environment:
      # Telegram (все ID должны быть проброшены сюда — иначе mergeAdminIDs в контейнере их не увидит)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_ID_1: ${TELEGRAM_ADMIN_ID_1}
      TELEGRAM_ADMIN_ID_2: ${TELEGRAM_ADMIN_ID_2:-}
      TELEGRAM_ADMIN_ID_3: ${TELEGRAM_ADMIN_ID_3:-}
      TELEGRAM_ADMIN_ID_4: ${TELEGRAM_ADMIN_ID_4:-}
      TELEGRAM_ADMIN_ID_5: ${TELEGRAM_ADMIN_ID_5:-}
      # Альтернатива: один список через запятую (перекрывает/дополняет к одиночным TELEGRAM_ADMIN_ID_*)
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      
      # Database (значения без кавычек — иначе в контейнер попадёт "5432" и т.д.)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-antiblock}
      DB_SSLMODE: disable
      DB_TIMEZONE: UTC
      
      # ЮKassa (Telegram Payments, RUB)
      YOOKASSA_PROVIDER_TOKEN: ${YOOKASSA_PROVIDER_TOKEN:-}

      # xRocket Pay (TON)
      XROCKET_API_TOKEN: ${XROCKET_API_TOKEN}
      XROCKET_API_URL: ${XROCKET_API_URL:-https://pay.xrocket.tg}
      XROCKET_WEBHOOK_PORT: ${XROCKET_WEBHOOK_PORT:-8081}
      XROCKET_WEBHOOK_SECRET: ${XROCKET_WEBHOOK_SECRET:-}

      # CryptoBot (устарело, можно не заполнять)
      CRYPTOBOT_API_TOKEN: ${CRYPTOBOT_API_TOKEN:-}

      # TimeWeb — новые Premium (floating IP). Без токена новые покупки ставятся в очередь до настройки.
      TIMEWEB_API_TOKEN: ${TIMEWEB_API_TOKEN:-}
      TIMEWEB_AVAILABILITY_ZONE: ${TIMEWEB_AVAILABILITY_ZONE:-spb-3}
      TIMEWEB_SSH_USER: ${TIMEWEB_SSH_USER:-root}
      TIMEWEB_SSH_KEY_ID: ${TIMEWEB_SSH_KEY_ID:-0}
      TIMEWEB_SSH_KEY_PATH: ${TIMEWEB_SSH_KEY_PATH:-/antiblock/premium-keys/premium_bot_key}
    ports:
      - "127.0.0.1:8081:8081"  # Webhook xRocket (доступен только localhost; туннель cloudflared/ngrok проксирует снаружи)
      - "127.0.0.1:9090:9090"  # Prometheus metrics
    restart: unless-stopped
    networks:
      - antiblock-network

volumes:
  postgres_data:

networks:
  antiblock-network:
    driver: bridge
