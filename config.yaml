app:
  name: "AntiBlock MTProto Proxy Bot"
  version: "1.0.0"
  debug: false

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  admin_ids:
    - "${TELEGRAM_ADMIN_ID_1}"
  # ID чата/группы/канала для технических алертов (бот должен быть участником). Пусто = только лог. Перекрывается TELEGRAM_ERROR_LOG_CHAT_ID.
  error_log_chat_id: "${TELEGRAM_ERROR_LOG_CHAT_ID}"
  # Канал обязательной подписки для бесплатных пользователей (username без @ или ссылка). Пусто = отключено.
  forced_subscription_channel: ""

# ЮКасса: Smart Payment (redirect) + Telegram Payments token (опционально, для старого сценария).
yookassa:
  provider_token: "${YOOKASSA_PROVIDER_TOKEN}"
  shop_id: "${YOOKASSA_SHOP_ID}"
  secret_key: "${YOOKASSA_SECRET_KEY}"
  return_url: "${YOOKASSA_RETURN_URL}"
  webhook_port: "${YOOKASSA_WEBHOOK_PORT}"

database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "${DB_NAME}"
  sslmode: "${DB_SSLMODE}"
  timezone: "${DB_TIMEZONE}"

# CryptoPay отключён — оплата только через Telegram Stars.
# cryptobot:
#   api_token: "${CRYPTOBOT_API_TOKEN}"
#   api_url: "https://pay.crypt.bot/api"
#   webhook_port: "${CRYPTOBOT_WEBHOOK_PORT:8080}"
#   webhook_secret: "${CRYPTOBOT_WEBHOOK_SECRET}"

rate_limit:
  requests_per_second: 1
  burst_size: 3

workers:
  health_check:
    enabled: true
    interval_seconds: 300  # 5 минут
    timeout_seconds: 10
  
  subscription_checker:
    enabled: true
    interval_seconds: 60  # 1 минута

  premium_reminder:
    enabled: true
    interval_seconds: 86400  # 1 раз в сутки
    timeout_seconds: 300

  ad_repin:
    enabled: true
    interval_seconds: 3600  # 1 раз в час — повторное закрепление объявления, если пользователь открепил

  invoice_cleanup:
    enabled: true
    interval_seconds: 3600  # 1 раз в час — отменяем pending xRocket-инвойсы старше часа

  premium_health_check:
    enabled: true
    interval_seconds: 900   # 15 мин — проверка всех активных премиум-прокси
    unreachable_recheck_seconds: 300  # 5 мин — перепроверка недоступных до восстановления
    unreachable_alert_cooldown_seconds: 14400  # 4 ч — повторный алерт «недоступен» для того же прокси

proxy:
  default_secret_length: 32
  free_trial_days: 0  # 0 = нет бесплатного пробного периода

# Pro-сервер — Free прокси + Pro-группы + удаление legacy Premium-контейнеров (Docker TLS).
pro_docker:
  host: "185.104.113.242"
  port: 2376
  cert_path: "/antiblock/docker-certs"
  server_ip: "185.104.113.242"

# TimeWeb — новые Premium (floating IP). Без токена новые покупки ставятся в очередь до настройки.
timeweb:
  api_token: "${TIMEWEB_API_TOKEN}"
  availability_zone: "spb-3"
  ssh_user: "root"
  ssh_key_id: 0
  ssh_key_path: "/antiblock/premium-keys/premium_bot_key"
  # 0 = авто: Ubuntu 24.04 из GET /api/v1/os/servers; иначе явный os_id (TIMEWEB_PREMIUM_OS_ID)
  premium_server_os_id: 0
  # Пауза между SSH-сессиями к одному и тому же VPS (сек). 0 = выключить. Env: TIMEWEB_PREMIUM_SSH_MIN_INTERVAL_SEC
  premium_ssh_min_interval_seconds: 40
  # Исходящий прокси для mtg на Premium VPS (simple-run --proxy). Пример: socks5://127.0.0.1:1080 при SSH-туннеле. Env: TIMEWEB_PREMIUM_MTG_PROXY
  premium_mtg_upstream_proxy: ""
