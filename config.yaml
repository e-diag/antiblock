app:
  name: "AntiBlock MTProto Proxy Bot"
  version: "1.0.0"
  debug: false

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  admin_ids:
    - "${TELEGRAM_ADMIN_ID_1}"
  # Канал обязательной подписки для бесплатных пользователей (username без @ или ссылка). Пусто = отключено.
  forced_subscription_channel: ""

database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "${DB_NAME}"
  sslmode: "${DB_SSLMODE}"
  timezone: "${DB_TIMEZONE}"

cryptobot:
  api_token: "${CRYPTOBOT_API_TOKEN}"
  api_url: "https://pay.crypt.bot/api"
  webhook_port: "${CRYPTOBOT_WEBHOOK_PORT:8080}"
  webhook_secret: "${CRYPTOBOT_WEBHOOK_SECRET}"

rate_limit:
  requests_per_second: 1
  burst_size: 3

workers:
  health_check:
    enabled: true
    interval_seconds: 300  # 5 минут
    timeout_seconds: 10
  
  subscription_checker:
    enabled: true
    interval_seconds: 60  # 1 минута

  premium_reminder:
    enabled: true
    interval_seconds: 86400  # 1 раз в сутки
    timeout_seconds: 300

  ad_repin:
    enabled: true
    interval_seconds: 3600  # 1 раз в час — повторное закрепление объявления, если пользователь открепил

proxy:
  default_secret_length: 32
  free_trial_days: 0  # 0 = нет бесплатного пробного периода

# Премиум Docker: создание персональных mtg-контейнеров на удалённом сервере по TLS.
# cert_path — путь на машине, где запущен бот, к папке с ca.pem, cert.pem, key.pem.
#   Linux/Docker: /antiblock/docker-certs/
#   Windows: C:/antiblock/docker-certs или C:\antiblock\docker-certs
premium_docker:
  host: "185.104.113.242"
  port: 2376
  cert_path: "/antiblock/docker-certs"  # замените на реальный путь к папке с сертификатами
  server_ip: "185.104.113.242"
