name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  GO_VERSION: "1.24"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download Go modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build binary (sanity check)
        run: go build ./cmd/bot

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: antiblock-bot:test

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - test
      - docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy over SSH using docker-compose
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" "set -e; cd '${APP_DIR}'; git pull; docker compose pull || docker-compose pull; docker compose up -d --build || docker-compose up -d --build"
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" "set -e; cd '${APP_DIR}'; docker compose run -T --rm bot /app/restart_premium_mtg || docker-compose run -T --rm bot /app/restart_premium_mtg"

